<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MooTube - Home</title>
    <style>
        input {
            display: block;
            margin: 0 auto;
            width: 800px;
            height: 100;
            color: rgb(0, 0, 0);
            font-size: larger;
            background-repeat: repeat;
            background-size: 60px;
            border-radius: 50px;
            text-align: right;
            background-image: url("/static/cow-texture.jpg")
        }
        button {
            display: block;
            margin: 0 auto;
            color: rgb(0, 0, 0);
            font-size: larger;
            background-repeat: repeat;
            background-size: 60px;
            border-radius: 50px;
            text-align: right;
            background-image: url("/static/cow-texture.jpg");
        }
        body {
            background-repeat: repeat;
            background-size: 100px;
            margin: 0;
            background-color: rgb(240, 238, 238);
            font-family: Arial, Helvetica, sans-serif;
        }
        
        header {
            background-color: white;
            padding: 10px;
            display: flex; 
            align-items: center; 
            gap: 20px; 
            justify-content: center; 
        }

        .videos {
            text-align: center;
            margin: 50px;
        }
        
        h1 {
            margin: 0;
        }

        .video-player {
            width: 100%;
            max-width: 270px;
            border-radius: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .video-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            margin-top: 30px;
        }

        .video-card {
            background: white;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            width: 200px;
        }

        .video-card video {
            width: 100%;
            border-radius: 10px;
        }
        .features {
            margin-left: 30px;
        }
    </style>
</head>
<body>
    <header>
        <h1>🐮 MooTube</h1>
        <form action="/pesquisar" method="get">
            <input type="search" name="busca" placeholder="Pesquisar vídeos...">
        </form>
    </header>
    <div class="features">
        <h1>Informações</h1>
        <p>Versão Atual: 26.07.02</p>
        <p>Nome do update Atual: Vaca Feliz</p>
        <p>Status do Update: Em desenvolvimento</p>
        <h1>Features do mootube</h1>
        <ul>
            <li>Mudança no layout</li>
            <li>Automação via urls.txt</li>
            <li>Versionamento oficial por data</li>
            <li>Botão Features</li>
            <li>Botão Licença</li>
        </ul>
    </div>
</body>
</html>
